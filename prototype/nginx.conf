server {
    listen 80;
    server_name aggregator.willeai.cn;

    # 续期验证用
    location /.well-known/acme-challenge/ {
        root /var/www/aggregator.willeai.cn;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name aggregator.willeai.cn;

    ssl_certificate /etc/letsencrypt/live/aggregator.willeai.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aggregator.willeai.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/aggregator.willeai.cn;
    index index.html;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
